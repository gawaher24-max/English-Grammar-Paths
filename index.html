<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>English Grammar Path - Ms. Afnan</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .step-card { display: none; }
        .step-card.active { display: block; animation: fadeIn 0.4s ease; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body class="bg-slate-50 min-h-screen font-sans border-t-8 border-indigo-600">

    <div class="max-w-2xl mx-auto py-12 px-4">
        <div class="bg-white shadow-2xl rounded-3xl overflow-hidden border border-slate-200">
            
            <div class="bg-indigo-600 p-6 text-center text-white">
                <h1 class="text-2xl font-black uppercase tracking-widest">Grammar Pathway</h1>
                <p class="text-indigo-100 text-sm mt-1 italic">Inspired by Ms. Afnan</p>
            </div>

            <div class="p-8">
                <div id="step-1" class="step-card active">
                    <h2 class="text-lg font-bold mb-6 text-slate-700 text-center">1. Identify Sentence Type:</h2>
                    <div class="flex flex-col gap-4">
                        <button onclick="nextStep(1, 2, 'nominal')" class="p-4 bg-white border-2 border-indigo-100 hover:border-indigo-500 rounded-xl font-bold text-indigo-700 transition-all text-left flex justify-between items-center">
                            <span>Nominal (State of Being)</span>
                            <span class="text-xs bg-indigo-100 px-2 py-1 rounded text-indigo-600">e.g. He is...</span>
                        </button>
                        <button onclick="nextStep(1, 2, 'verbal')" class="p-4 bg-white border-2 border-emerald-100 hover:border-emerald-500 rounded-xl font-bold text-emerald-700 transition-all text-left flex justify-between items-center">
                            <span>Verbal (Action)</span>
                            <span class="text-xs bg-emerald-100 px-2 py-1 rounded text-emerald-600">e.g. He plays...</span>
                        </button>
                    </div>
                </div>

                <div id="step-2" class="step-card">
                    <h2 class="text-lg font-bold mb-6 text-slate-700 text-center">2. Choose the Tense:</h2>
                    <div class="grid grid-cols-2 gap-4">
                        <button onclick="nextStep(2, 3, 'present')" class="p-6 border rounded-2xl hover:bg-slate-50 font-bold text-slate-600">Present (Now)</button>
                        <button onclick="nextStep(2, 3, 'past')" class="p-6 border rounded-2xl hover:bg-slate-50 font-bold text-slate-600">Past (Then)</button>
                    </div>
                </div>

                <div id="step-3" class="step-card">
                    <h2 class="text-lg font-bold mb-6 text-slate-700 text-center">3. Select Subject:</h2>
                    <div class="grid grid-cols-2 gap-3">
                        <button onclick="nextStep(3, 4, 'he')" class="p-4 border rounded-xl hover:bg-slate-50">Male (He)</button>
                        <button onclick="nextStep(3, 4, 'she')" class="p-4 border rounded-xl hover:bg-slate-50">Female (She)</button>
                        <button onclick="nextStep(3, 4, 'i')" class="p-4 border rounded-xl hover:bg-slate-50">Self (I)</button>
                        <button onclick="nextStep(3, 4, 'plural')" class="p-4 border rounded-xl hover:bg-slate-50">Plural (We/They)</button>
                    </div>
                </div>

                <div id="step-4" class="step-card">
                    <h2 class="text-lg font-bold mb-6 text-slate-700 text-center">4. Sentence Form:</h2>
                    <div class="grid grid-cols-1 gap-3">
                        <button onclick="finish('pos')" class="p-3 bg-green-50 border border-green-200 rounded-lg text-green-700 font-bold hover:bg-green-100">Positive (+)</button>
                        <button onclick="finish('neg')" class="p-3 bg-red-50 border border-red-200 rounded-lg text-red-700 font-bold hover:bg-red-100">Negative (-)</button>
                        <button onclick="finish('ques')" class="p-3 bg-blue-50 border border-blue-200 rounded-lg text-blue-700 font-bold hover:bg-blue-100">Simple Question (?)</button>
                        <button onclick="finish('wh')" class="p-3 bg-amber-50 border border-amber-200 rounded-lg text-amber-700 font-bold hover:bg-amber-100">Double Question (WH-)</button>
                    </div>
                </div>

                <div id="result-step" class="step-card">
                    <div class="bg-slate-900 text-white rounded-2xl p-6 shadow-xl">
                        <div class="mb-6">
                            <span class="text-indigo-400 text-xs font-black uppercase tracking-tighter">The Rule Pattern</span>
                            <p id="rule-display" class="text-2xl font-mono mt-2 text-white"></p>
                        </div>
                        <div class="mb-6">
                            <span class="text-emerald-400 text-xs font-black uppercase tracking-tighter">Real Example</span>
                            <p id="example-display" class="text-xl italic text-slate-300 mt-2"></p>
                        </div>
                        <button onclick="resetApp()" class="w-full py-4 bg-indigo-600 hover:bg-indigo-500 rounded-xl font-bold transition-all transform hover:scale-105">New Pathway</button>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        let data = { type: '', tense: '', sub: '', status: '' };

        function nextStep(current, next, val) {
            if(current === 1) data.type = val;
            if(current === 2) data.tense = val;
            if(current === 3) data.sub = val;
            document.getElementById('step-' + current).classList.remove('active');
            document.getElementById('step-' + next).classList.add('active');
        }

        function finish(status) {
            data.status = status;
            document.getElementById('step-4').classList.remove('active');
            document.getElementById('result-step').classList.add('active');
            generateResult();
        }

        function generateResult() {
            let rule = ""; let ex = "";
            const isNominal = data.type === 'nominal';
            const isPresent = data.tense === 'present';

            if(isNominal) {
                let be = isPresent ? (data.sub === 'i' ? 'am' : (data.sub === 'plural' ? 'are' : 'is')) : (data.sub === 'plural' ? 'were' : 'was');
                if(data.status === 'pos') { rule = `S + ${be} + Complement`; ex = `${data.sub.toUpperCase()} ${be} a student.`; }
                else if(data.status === 'neg') { rule = `S + ${be} + NOT`; ex = `${data.sub.toUpperCase()} ${be} not here.`; }
                else if(data.status === 'ques') { rule = `${be.toUpperCase()} + S + ...?`; ex = `${be.toUpperCase()} ${data.sub} ready?`; }
                else if(data.status === 'wh') { rule = `WH + ${be} + S?`; ex = `Where ${be} ${data.sub}?`; }
            } else {
                if(isPresent) {
                    let aux = (data.sub === 'he' || data.sub === 'she') ? 'does' : 'do';
                    let v = (data.sub === 'he' || data.sub === 'she') ? 'works' : 'work';
                    if(data.status === 'pos') { rule = `S + Verb(s)`; ex = `${data.sub.toUpperCase()} ${v} hard.`; }
                    else if(data.status === 'neg') { rule = `S + ${aux} + NOT + Verb`; ex = `${data.sub.toUpperCase()} ${aux} not work.`; }
                    else if(data.status === 'ques') { rule = `${aux.toUpperCase()} + S + Verb?`; ex = `${aux.toUpperCase()} ${data.sub} work?`; }
                    else if(data.status === 'wh') { rule = `WH + ${aux} + S + Verb?`; ex = `Why ${aux} ${data.sub} work?`; }
                } else {
                    if(data.status === 'pos') { rule = `S + Verb(ed)`; ex = `${data.sub.toUpperCase()} worked yesterday.`; }
                    else if(data.status === 'neg') { rule = `S + DID NOT + Verb`; ex = `${data.sub.toUpperCase()} did not work.`; }
                    else if(data.status === 'ques') { rule = `DID + S + Verb?`; ex = `Did ${data.sub} work?`; }
                    else if(data.status === 'wh') { rule = `WH + DID + S + Verb?`; ex = `When did ${data.sub} work?`; }
                }
            }
            document.getElementById('rule-display').innerText = rule;
            document.getElementById('example-display').innerText = ex;
        }

        function resetApp() { location.reload(); }
    </script>
</body>
</html>
